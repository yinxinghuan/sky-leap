<!DOCTYPE html>
<html lang="en">
<head>
<meta name="game-uuid" content="eefd9179-7b36-4440-8b73-0cb1ea4e153e" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Sky Leap</title>
<script src="./aigram-bridge.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#3a2c52;            /* deep plum — text on glass */
    --ink-soft:#6c5f88;       /* muted label */
    --pink:#ff4d97;           /* CTA / accent */
    --pink-deep:#ec3a86;
    --pink-2:#ff85bd;
    --gold:#ffcf4d;
    --sky-1:#aed4f1; --sky-2:#cfe4f5; --sky-3:#ffd9e7;
    --glass:linear-gradient(145deg, rgba(255,255,255,.74), rgba(255,255,255,.52));
    --glass-strong:linear-gradient(150deg, rgba(255,255,255,.9), rgba(255,255,255,.72));
    --glass-border:rgba(255,255,255,.78);
    --glass-shadow:0 12px 34px rgba(58,76,128,.22), inset 0 1px 0 rgba(255,255,255,.9);
    --blur:saturate(165%) blur(18px);
    --font:"Fredoka","PingFang SC",system-ui,-apple-system,sans-serif;
  }
  * { box-sizing:border-box; }
  html, body {
    margin:0; height:100%; overflow:hidden;
    background:linear-gradient(180deg, var(--sky-1) 0%, var(--sky-2) 44%, var(--sky-3) 100%);
    font-family:var(--font);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  #wrap { position:fixed; inset:0; overflow:hidden; }
  #c { display:block; width:100%; height:100%; touch-action:none; }

  .hud { position:fixed; pointer-events:none; z-index:5; }

  /* ── Wordmark — gradient brand title, title state only ── */
  #wordmark {
    /* Sit below the leaderboard champion-pill row so the two don't collide */
    top:max(84px,calc(env(safe-area-inset-top) + 68px)); left:50%;
    transform:translateX(-50%);
    width:max-content; max-width:94vw;
    text-align:center; line-height:1; padding-bottom:6px;     /* breathing room so the P/L descenders aren't clipped */
    transition:opacity .4s ease, transform .4s ease;
  }
  #wordmark .b {
    display:block; font-weight:700; font-size:84px; line-height:.86; letter-spacing:.005em;
    padding:.05em 0 .12em;                                    /* extra glyph room — Fredoka's descender box + drop-shadow can clip otherwise */
    background:linear-gradient(170deg, #fff 6%, var(--pink-2) 56%, var(--pink) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 4px 12px rgba(58,44,82,.34)) drop-shadow(0 1px 0 rgba(255,255,255,.5));
  }
  #wordmark .sub {
    display:block; font-weight:500; font-size:14px; letter-spacing:.34em;
    color:rgba(58,44,82,.66); margin-top:8px; text-transform:uppercase;
    padding-left:.34em;
  }
  #wordmark.hidden { opacity:0; transform:translate(-50%,-16px); }

  /* ── Score — centered top, big, legible over the sky ── */
  #score {
    top:max(26px,calc(env(safe-area-inset-top) + 12px)); left:50%; transform:translateX(-50%);
    font-weight:700; color:#fff; font-size:66px; line-height:1;
    font-variant-numeric:tabular-nums; letter-spacing:.01em;
    text-shadow:0 2px 1px rgba(58,44,82,.28), 0 6px 22px rgba(58,76,128,.5);
    opacity:0; transition:opacity .3s ease;
  }
  #score.show { opacity:1; }
  #score.bump { animation:sl-bump .3s cubic-bezier(.3,1.5,.5,1); }
  @keyframes sl-bump {
    0%   { transform:translateX(-50%) scale(1.22); }
    100% { transform:translateX(-50%) scale(1); }
  }

  /* ── Combo — frosted pill under the score when ≥2 ── */
  #combo {
    top:calc(max(26px,calc(env(safe-area-inset-top) + 12px)) + 74px); left:50%;
    transform:translateX(-50%) translateY(4px);
    font-weight:600; font-size:15px; letter-spacing:.08em; line-height:1; color:var(--pink-deep);
    background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--glass-border); box-shadow:0 6px 18px rgba(58,76,128,.18);
    padding:7px 14px; border-radius:999px;
    opacity:0; transition:opacity .22s ease, transform .22s ease;
  }
  #combo.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #combo.pop { animation:sl-combopop .34s cubic-bezier(.3,1.6,.5,1); }
  @keyframes sl-combopop {
    from { transform:translateX(-50%) scale(.6); }
    to   { transform:translateX(-50%) scale(1); }
  }

  /* ── Floating per-jump rating pop — colour shifts by tone, animation
        holds for a moment so the call is actually readable. ── */
  #pop {
    top:38%; left:50%; transform:translate(-50%,-50%);
    font-weight:700; font-size:42px; letter-spacing:.02em; white-space:nowrap; text-align:center;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    background-image:linear-gradient(180deg, #fff, var(--pink-2));   /* default fallback */
    filter:drop-shadow(0 4px 16px rgba(255,77,151,.5)) drop-shadow(0 1px 0 rgba(255,255,255,.6));
    opacity:0;
  }
  #pop.tone-perfect { background-image:linear-gradient(180deg, #fff 4%, #ffd87a 52%, #ff9d2e 100%);
    filter:drop-shadow(0 4px 18px rgba(255,170,40,.55)) drop-shadow(0 1px 0 rgba(255,255,255,.6)); }
  #pop.tone-good    { background-image:linear-gradient(180deg, #fff 6%, #b6f5d2 50%, #2dd680 100%);
    filter:drop-shadow(0 4px 18px rgba(45,214,128,.55)) drop-shadow(0 1px 0 rgba(255,255,255,.6)); }
  #pop.tone-plain   { background-image:linear-gradient(180deg, #fff 6%, #d5e8fb 50%, #7ea7d5 100%);
    filter:drop-shadow(0 4px 18px rgba(126,167,213,.55)) drop-shadow(0 1px 0 rgba(255,255,255,.6)); }
  #pop.tone-barely  { background-image:linear-gradient(180deg, #fff 4%, #ffbca5 50%, #ff4d4d 100%);
    filter:drop-shadow(0 4px 18px rgba(255,80,80,.6)) drop-shadow(0 1px 0 rgba(255,255,255,.6)); }
  #pop.go { animation:sl-pop 1.35s ease-out; }
  @keyframes sl-pop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(.55); }
    14%  { opacity:1; transform:translate(-50%,-64%) scale(1.16); }
    24%  { opacity:1; transform:translate(-50%,-72%) scale(1.02); }
    72%  { opacity:1; transform:translate(-50%,-82%) scale(1.0); }   /* hold steady so the call is actually readable */
    100% { opacity:0; transform:translate(-50%,-112%) scale(.98); }
  }

  /* ── Guide — a single reused touch_app finger icon hinting "hold" ── */
  #guide {
    bottom:calc(17% + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:14px;
    opacity:0; transition:opacity .45s ease;
  }
  #guide.show { opacity:1; }
  #guide .g-finger {
    position:relative; width:58px; height:58px; transform-origin:50% 24%;
    animation:g-press 1.5s ease-in-out infinite;
  }
  #guide .g-finger svg {
    width:100%; height:100%; display:block; fill:rgba(255,255,255,.96);
    filter:drop-shadow(0 0 6px rgba(58,76,128,.55)) drop-shadow(0 2px 4px rgba(0,0,0,.25));
  }
  /* ripple pulsing under the fingertip = the press target */
  #guide .g-ripple {
    position:absolute; left:46%; top:26%; width:20px; height:20px; margin:-10px 0 0 -10px;
    border-radius:50%; border:2px solid rgba(255,255,255,.85);
    box-shadow:0 0 12px rgba(255,255,255,.5);
    animation:g-ripple 1.5s ease-out infinite;
  }
  #guide .g-label {
    font-weight:600; font-size:16px; letter-spacing:.04em;
    color:#fff; text-shadow:0 2px 8px rgba(58,76,128,.5);
  }
  @keyframes g-press {
    0%,100% { transform:translateY(-5px) scale(1); }
    42%,68% { transform:translateY(3px) scale(.93); }   /* press down + hold */
  }
  @keyframes g-ripple {
    0%,28%  { transform:scale(.5); opacity:0; }
    44%     { opacity:.85; }
    100%    { transform:scale(2.4); opacity:0; }
  }

  /* ── Collection entry + ticket wallet ── */
  #collectionEntry {
    position:fixed; left:12px; top:max(16px,calc(env(safe-area-inset-top) + 8px)); z-index:7;
    display:flex; align-items:center; gap:8px; min-height:44px; padding:5px 12px 5px 6px;
    border:1px solid var(--glass-border); border-radius:999px; color:var(--ink); background:var(--glass);
    -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); box-shadow:0 8px 20px rgba(58,76,128,.2);
    font:600 13px/1 var(--font); cursor:pointer; transition:transform .15s ease, opacity .25s ease;
  }
  #collectionEntry:active { transform:scale(.96); }
  #collectionEntry.playing { opacity:0; pointer-events:none; }
  .collection-avatar { width:32px; height:32px; display:grid; place-items:center; border-radius:10px; background:var(--avatar-tone,#75b8dd); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,.48); font-size:18px; }
  .collection-copy { display:flex; flex-direction:column; gap:2px; text-align:left; }
  .collection-copy small { color:var(--ink-soft); font-size:10px; letter-spacing:.08em; }
  #ticketWallet { font-variant-numeric:tabular-nums; color:var(--pink-deep); }

  /* ── Character shop: a compact subway-platform roster, not a randomizer ── */
  #shop { position:fixed; inset:0; z-index:45; display:none; align-items:flex-end; justify-content:center;
    padding:max(16px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom)); background:rgba(38,28,62,.48); -webkit-backdrop-filter:blur(5px); backdrop-filter:blur(5px); }
  #shop.show { display:flex; animation:sl-fade .22s ease; }
  .shop-sheet { width:min(520px,100%); max-height:min(780px,92dvh); display:flex; flex-direction:column; overflow:hidden; border-radius:28px 28px 22px 22px; color:#3a2c52; background:linear-gradient(165deg,#fff8fc,#f5efff); border:1px solid rgba(255,255,255,.9); box-shadow:0 24px 60px rgba(43,31,79,.42), inset 0 1px 0 #fff; animation:sl-rise .3s cubic-bezier(.2,1.1,.4,1); }
  .shop-head { padding:19px 18px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(95,69,138,.12); }
  .shop-eyebrow { margin:0 0 4px; color:#8e6a9e; font-size:11px; font-weight:700; letter-spacing:.15em; }
  .shop-head h2 { margin:0; font-size:27px; line-height:1; }
  .shop-wallet { display:flex; align-items:center; gap:6px; padding:9px 11px; border-radius:12px; background:#fff; border:1px solid rgba(255,77,151,.16); color:var(--pink-deep); box-shadow:0 4px 10px rgba(88,52,130,.09); font-weight:700; }
  .shop-wallet svg { width:18px; height:18px; fill:var(--gold); stroke:#bd7e20; stroke-width:1.5; }
  .shop-note { margin:0; padding:12px 18px; color:#785d91; font-size:13px; line-height:1.45; }
  .collection-avatar svg { width:72%; height:72%; fill:currentColor; }
  .shop-stage { position:relative; height:min(350px,42dvh); min-height:230px; overflow:hidden; border-top:1px solid rgba(255,255,255,.72); border-bottom:3px solid var(--pink); background:radial-gradient(circle at 50% 28%,#fff 0 12%,rgba(255,232,246,.94) 42%,rgba(210,221,255,.82) 100%); }
  .shop-stage::before { content:""; position:absolute; inset:auto -12% -42px; height:112px; border-radius:50%; background:rgba(255,255,255,.38); filter:blur(8px); }
  .shop-stage::after { content:""; position:absolute; left:50%; bottom:23px; width:136px; height:20px; transform:translateX(-50%); border:2px solid rgba(255,77,151,.55); border-radius:50%; background:#fff7fc; box-shadow:0 7px 0 rgba(91,62,126,.16); }
  #shopCanvas { position:absolute; z-index:2; inset:0; width:100%; height:100%; pointer-events:none; }
  .shop-preview { position:absolute; z-index:1; bottom:43px; width:38%; height:54%; object-fit:contain; opacity:.38; filter:saturate(.85) drop-shadow(0 7px 6px rgba(58,44,82,.12)); }
  .shop-preview--side { transition:opacity .18s ease, transform .18s ease; }
  #shopPrev { left:-19%; transform:rotateY(20deg); } #shopNext { right:-19%; transform:rotateY(-20deg); }
  .shop-step { position:absolute; z-index:4; top:50%; width:52px; height:52px; transform:translateY(-50%); display:grid; place-items:center; border:0; border-radius:50%; background:var(--pink); color:#fff; box-shadow:0 7px 16px rgba(236,58,134,.32), inset 0 1px 0 rgba(255,255,255,.42); cursor:pointer; }
  .shop-step:active { transform:translateY(-50%) scale(.94); box-shadow:0 3px 8px rgba(236,58,134,.32); }
  .shop-step svg { width:25px; height:25px; fill:none; stroke:currentColor; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }
  #shopPrevBtn { left:12px; } #shopNextBtn { right:12px; }
  .shop-count { position:absolute; z-index:4; right:13px; bottom:12px; padding:5px 8px; border-radius:999px; color:#fff; background:#5a4376; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; }
  .shop-identity { padding:11px 18px 8px; text-align:left; }
  .shop-tier { margin:0 0 2px; color:var(--pink-deep); font-size:10px; font-weight:700; letter-spacing:.12em; }
  .shop-name-line { display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .shop-name-line strong { font-size:26px; line-height:1.1; } .shop-name-line small { color:var(--ink-soft); font-size:12px; white-space:nowrap; }
  .shop-state { display:inline-flex; align-items:center; gap:4px; margin-top:5px; min-height:25px; padding:3px 8px; border:1px solid rgba(58,44,82,.24); border-radius:999px; color:var(--ink-soft); font-size:12px; font-weight:700; }
  .shop-state.owned { border-color:rgba(255,77,151,.45); color:var(--pink-deep); background:rgba(255,218,235,.43); } .shop-state.locked { color:var(--ink); background:rgba(255,207,77,.24); }
  .shop-state svg, .shop-action svg { width:15px; height:15px; fill:var(--gold); stroke:#bd7e20; stroke-width:1.5; }
  .shop-rail { display:flex; justify-content:center; gap:5px; padding:0 18px 10px; } .shop-rail i { width:18px; height:3px; border-radius:99px; background:#ddd1e7; } .shop-rail i.active { width:28px; background:var(--pink); } .shop-rail i.owned { background:#b8a2cc; }
  .shop-action { min-height:52px; margin:0 14px 10px; display:flex; align-items:center; justify-content:center; gap:7px; border:0; border-radius:999px; color:#fff; background:linear-gradient(145deg,var(--pink-2),var(--pink) 58%,var(--pink-deep)); box-shadow:0 9px 18px rgba(236,58,134,.32), inset 0 1px 0 rgba(255,255,255,.5); font:700 18px var(--font); cursor:pointer; }
  .shop-action.equipped { color:#6c5f88; background:#e5ddeb; box-shadow:none; } .shop-action:disabled { cursor:default; opacity:.78; }
  .shop-close { min-height:48px; margin:0 14px 14px; border:0; border-radius:999px; color:#725988; background:rgba(255,255,255,.7); font:600 16px var(--font); cursor:pointer; }
  @media (max-height:620px) {
    #shop { padding:7px 12px; } .shop-head { padding:11px 14px 9px; } .shop-head h2 { font-size:24px; }
    .shop-note { padding:7px 14px; font-size:12px; } .shop-stage { height:200px; min-height:190px; }
    .shop-identity { padding:7px 14px 4px; } .shop-name-line strong { font-size:23px; } .shop-state { margin-top:3px; min-height:22px; }
    .shop-rail { padding:0 14px 6px; } .shop-action { min-height:45px; margin:0 14px 7px; font-size:16px; } .shop-close { min-height:38px; margin:0 14px 8px; }
  }

  /* ── Game over card — frosted glass ── */
  #over {
    position:fixed; inset:0; display:none;
    align-items:center; justify-content:center;
    background:rgba(58,44,82,.4); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    z-index:30; padding:24px; pointer-events:auto;
  }
  #over.show { display:flex; animation:sl-fade .25s ease; }
  @keyframes sl-fade { from{opacity:0;} to{opacity:1;} }
  #over .card {
    text-align:center; max-width:330px; width:100%;
    background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:var(--ink); border:1px solid var(--glass-border); border-radius:28px;
    box-shadow:var(--glass-shadow), 0 24px 60px rgba(58,76,128,.28);
    padding:30px 26px 26px; display:flex; flex-direction:column; align-items:center;
    animation:sl-rise .34s cubic-bezier(.2,1.1,.4,1);
  }
  @keyframes sl-rise { from{transform:translateY(18px) scale(.96); opacity:0;} to{transform:none; opacity:1;} }
  #over h1 {
    font-weight:700; font-size:clamp(26px,8vw,34px); color:var(--ink);
    margin:0 0 18px; letter-spacing:.005em; line-height:1.1;
  }
  #over .rows { display:flex; gap:14px; justify-content:center; width:100%; }
  #over .stat {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.7);
    border-radius:18px; padding:12px 8px;
  }
  #over .stat .k {
    font-weight:600; font-size:11px; letter-spacing:.16em; color:var(--ink-soft);
    text-transform:uppercase;
  }
  #over .stat .v {
    font-weight:700; font-size:40px; color:var(--ink);
    font-variant-numeric:tabular-nums; line-height:1;
  }
  #over .stat.best .v {
    background:linear-gradient(150deg, var(--gold), #f5a623);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  #over .btns { display:flex; flex-direction:column; gap:10px; width:100%; margin-top:22px; }
  .btn-cta, .btn-ghost {
    pointer-events:auto; width:100%; min-height:48px; border-radius:999px;
    font-family:var(--font); font-weight:600; letter-spacing:.04em; cursor:pointer;
    -webkit-tap-highlight-color:transparent; border:none;
    transition:transform .12s ease, box-shadow .12s ease, background .2s ease;
  }
  .btn-cta {
    font-size:21px; color:#fff;
    background:linear-gradient(150deg, var(--pink-2), var(--pink) 55%, var(--pink-deep));
    box-shadow:0 10px 24px rgba(255,77,151,.45), inset 0 1px 0 rgba(255,255,255,.5);
    text-shadow:0 1px 2px rgba(180,30,90,.5);
  }
  .btn-cta:active { transform:translateY(2px); box-shadow:0 5px 14px rgba(255,77,151,.45), inset 0 1px 0 rgba(255,255,255,.5); }
  .btn-ghost {
    font-size:17px; color:var(--ink);
    background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.75);
    box-shadow:0 4px 12px rgba(58,76,128,.14);
  }
  .btn-ghost:active { transform:translateY(2px); background:rgba(255,255,255,.7); }

  /* ── Champion pill — frosted glass, tap to open the full leaderboard ── */
  #lb {
    position:fixed; top:max(20px,calc(env(safe-area-inset-top) + 8px)); right:12px;
    z-index:6; pointer-events:auto; display:none;
  }
  #lb.show { display:block; }
  .lbrow {
    display:flex; align-items:center; gap:7px;
    background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--glass-border); box-shadow:0 8px 20px rgba(58,76,128,.2);
    border-radius:999px; padding:5px 14px 5px 6px;
    font-weight:600; font-size:15px; color:var(--ink); line-height:1; letter-spacing:.01em;
    cursor:pointer; -webkit-tap-highlight-color:transparent; transition:transform .12s ease;
  }
  .lbrow:active { transform:scale(.96); }
  .lbrow .crown { width:16px; height:16px; flex:0 0 auto; display:block; }
  .lbrow .crown path { fill:var(--gold); stroke:rgba(180,120,20,.55); stroke-width:1.2; stroke-linejoin:round; }
  .lbrow .av, .lbrow .avf {
    width:25px; height:25px; border-radius:50%; border:1.5px solid rgba(255,255,255,.9);
    box-shadow:0 1px 4px rgba(58,76,128,.3);
    flex:0 0 auto; display:block; object-fit:cover;
  }
  .lbrow .avf {
    background:linear-gradient(150deg, var(--pink-2), var(--pink)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600;
  }
  .lbrow .nm { max-width:66px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lbrow .sc { color:var(--pink-deep); font-weight:700; font-variant-numeric:tabular-nums; }
  .lbrow.me .nm { color:var(--pink-deep); }

  /* ── Full leaderboard overlay — frosted glass ── */
  #lbFull {
    position:fixed; inset:0; display:none; z-index:40; padding:22px;
    align-items:center; justify-content:center;
    background:rgba(58,44,82,.42); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    pointer-events:auto;
  }
  #lbFull.show { display:flex; animation:sl-fade .25s ease; }
  #lbFull .lcard {
    background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--glass-border); border-radius:26px;
    width:100%; max-width:380px; max-height:84vh;
    display:flex; flex-direction:column; padding:22px 18px 18px;
    box-shadow:var(--glass-shadow), 0 24px 60px rgba(58,76,128,.28);
    animation:sl-rise .34s cubic-bezier(.2,1.1,.4,1);
  }
  #lbFull h2 {
    font-weight:700; font-size:24px; color:var(--ink);
    margin:0 0 6px; text-align:center; letter-spacing:.01em;
  }
  #lbFull .lsub {
    text-align:center; font-weight:500; font-size:12px; letter-spacing:.18em;
    color:var(--ink-soft); text-transform:uppercase; margin:0 0 16px;
  }
  #lblist {
    display:flex; flex-direction:column; gap:8px;
    overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2px;
  }
  .lb-download-state {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; padding:34px 18px 38px; text-align:center; color:var(--ink,#fff);
  }
  .lb-download-state .ico { width:34px; height:34px; line-height:1; }
  .lb-download-state .ico svg { width:100%; height:100%; fill:var(--gold); stroke:#bd7e20; stroke-width:1.2; }
  .lb-download-state .txt { max-width:260px; font-size:14px; line-height:1.45; opacity:.72; }
  .lb-download-state .btn {
    display:inline-flex; align-items:center; justify-content:center; min-height:40px;
    padding:0 16px; border-radius:999px; border:1px solid rgba(255,255,255,.32);
    background:rgba(255,255,255,.14); color:inherit; text-decoration:none;
    font-size:13px; font-weight:700; letter-spacing:0; -webkit-tap-highlight-color:transparent;
    transition:background .15s ease, transform .15s ease;
  }
  .lb-download-state .btn:active { background:rgba(255,255,255,.22); transform:scale(.97); }

  .lfrow {
    display:flex; align-items:center; gap:11px;
    border:1px solid rgba(255,255,255,.7); border-radius:16px; background:rgba(255,255,255,.5);
    padding:9px 14px 9px 11px; cursor:pointer;
    font-weight:600; font-size:17px; color:var(--ink); line-height:1; letter-spacing:.01em;
    -webkit-tap-highlight-color:transparent; transition:transform .12s ease, background .2s ease;
  }
  .lfrow:active { transform:scale(.985); background:rgba(255,255,255,.65); }
  .lfrow .rk { font-size:15px; min-width:30px; text-align:center; color:var(--ink-soft); font-weight:700; }
  .lfrow .av, .lfrow .avf {
    width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(255,255,255,.9);
    box-shadow:0 1px 5px rgba(58,76,128,.28);
    flex:0 0 auto; display:block; object-fit:cover;
  }
  .lfrow .avf {
    background:linear-gradient(150deg, var(--pink-2), var(--pink)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600;
  }
  .lfrow .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lfrow .sc { color:var(--pink-deep); font-weight:700; font-variant-numeric:tabular-nums; }
  .lfrow.me { background:linear-gradient(150deg, rgba(255,133,189,.32), rgba(255,77,151,.2)); border-color:rgba(255,77,151,.45); }
  .lfrow.me .nm { color:var(--pink-deep); }
  .lfrow.me .rk { color:var(--pink-deep); }
  #lbClose {
    margin-top:16px; align-self:stretch; min-height:46px; border:none; border-radius:999px;
    background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.75); color:var(--ink);
    font-family:var(--font); font-weight:600; font-size:17px; letter-spacing:.04em;
    cursor:pointer; -webkit-tap-highlight-color:transparent; box-shadow:0 4px 12px rgba(58,76,128,.14);
    transition:transform .12s ease, background .2s ease;
  }
  #lbClose:active { transform:translateY(2px); background:rgba(255,255,255,.7); }

  @media (prefers-reduced-motion: reduce) {
    #guide .g-finger, #guide .g-ripple { animation:none; }
    #guide .g-finger { transform:translateY(0); }
    #over.show, #over .card, #lbFull.show, #lbFull .lcard, #score.bump, #combo.pop { animation:none; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="wordmark" class="hud"><span class="b">Sky<br>Leap</span><span class="sub">hold &amp; release to soar</span></div>
  <div id="score" class="hud">0</div>
  <div id="combo" class="hud"></div>
  <div id="pop" class="hud"></div>
  <div id="guide" class="hud">
    <div class="g-finger">
      <span class="g-ripple"></span>
      <!-- Material Icons touch_app (Apache 2.0) — the shared "ghost finger" gesture glyph -->
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.92-1.38z"/></svg>
    </div>
    <div class="g-label">Hold to charge</div>
  </div>
  <div id="lb"></div>
  <button id="collectionEntry" type="button" aria-label="Open character collection">
    <span class="collection-avatar" aria-hidden="true">●</span>
    <span class="collection-copy"><span>角色收藏</span><small><span id="ticketWallet">0</span> 张车票</small></span>
  </button>
</div>

<div id="shop" aria-hidden="true">
  <section class="shop-sheet" role="dialog" aria-modal="true" aria-labelledby="shopTitle">
    <header class="shop-head"><div><p class="shop-eyebrow">SKY LEAP COLLECTION</p><h2 id="shopTitle">通勤者衣柜</h2></div><div class="shop-wallet" aria-label="Tickets"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7Z"/></svg><span id="shopTickets">0</span></div></header>
    <p class="shop-note">每局结束获得车票。先看看他们的样子，再决定带谁跳向下一站。</p>
    <div id="shopStage" class="shop-stage">
      <img id="shopPrev" class="shop-preview shop-preview--side" alt="" draggable="false" />
      <canvas id="shopCanvas" aria-label="当前角色 3D 预览"></canvas>
      <img id="shopNext" class="shop-preview shop-preview--side" alt="" draggable="false" />
      <button id="shopPrevBtn" class="shop-step" type="button" aria-label="上一位角色"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14 5-7 7 7 7"/></svg></button>
      <button id="shopNextBtn" class="shop-step" type="button" aria-label="下一位角色"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m10 5 7 7-7 7"/></svg></button>
      <span id="shopCount" class="shop-count">1 / 6</span>
    </div>
    <div class="shop-identity"><p id="shopTier" class="shop-tier"></p><div class="shop-name-line"><strong id="shopName"></strong><small id="shopEnglish"></small></div><span id="shopState" class="shop-state"></span></div>
    <div id="shopRail" class="shop-rail" aria-hidden="true"></div>
    <button id="shopAction" class="shop-action" type="button"></button>
    <button id="shopClose" class="shop-close" type="button">继续跳</button>
  </section>
</div>

<div id="lbFull">
  <div class="lcard">
    <h2>Sky Pilgrims</h2>
    <p class="lsub">Furthest leapers</p>
    <div id="lblist"></div>
    <button id="lbClose">Close</button>
  </div>
</div>

<div id="over">
  <div class="card">
    <h1>Fell into the clouds</h1>
    <div class="rows">
      <div class="stat"><span class="k">Reached</span><span class="v" id="finalScore">0</span></div>
      <div class="stat best"><span class="k">Best</span><span class="v" id="finalBest">0</span></div>
    </div>
    <div class="btns">
      <button class="btn-cta" id="again">Leap again</button>
      <button class="btn-ghost" id="overShop">Character collection</button>
      <button class="btn-ghost" id="overRank">View ranking</button>
    </div>
  </div>
</div>

<script type="module">
import { startGame } from './game.js';
import { CARTRIDGE } from './cartridge/index.js?v=1';
import * as THREE from 'three';
import { CHARACTERS, CHARACTER_CATALOG } from './builders/characters.js?v=3';

const $ = (s) => document.querySelector(s);
const canvas = $('#c');
const wordmarkEl = $('#wordmark');
const scoreEl = $('#score');
const comboEl = $('#combo');
const popEl = $('#pop');
const guideEl = $('#guide');
const overEl = $('#over');

const COLLECTION_KEY = 'sl.collection.v1';
const TICKET_ICON = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7Z"/></svg>';
const GLYPHS = {
  shopkeeper: 'M12 3a4 4 0 0 0-4 4v2h8V7a4 4 0 0 0-4-4Zm-6 8h12v9H6z',
  student: 'M3 8 12 3l9 5-9 5-9-5Zm5 6h8v5H8z', chef: 'M12 3c-4 0-6 3-5 6h10c1-3-1-6-5-6Zm-5 8h10v10H7z',
  delivery: 'M4 5h11v11H4zM15 8h3l2 3v5h-5zM7 18a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z',
  firefighter: 'M12 2c2 2 5 3 5 7a5 5 0 0 1-10 0c0-2 1-4 3-6 0 2 1 3 2 4 1-1 1-3 0-5Zm-5 13h10v7H7z',
  ghost: 'M5 20V9a7 7 0 0 1 14 0v11l-3-2-2 2-2-2-2 2-2-2-3 2Zm4-10h2v2H9zm4 0h2v2h-2z',
};
function readCollection(){
  try {
    const saved = JSON.parse(localStorage.getItem(COLLECTION_KEY) || 'null');
    const validKeys = new Set(CHARACTER_CATALOG.map(c => c.key));
    if (saved && Array.isArray(saved.unlocked)) return {
      tickets: Math.max(0, Number(saved.tickets) || 0),
      unlocked: [...new Set(saved.unlocked.filter(key => validKeys.has(key)))].concat(saved.unlocked.includes('shopkeeper') ? [] : ['shopkeeper']),
      equipped: validKeys.has(saved.equipped) && saved.unlocked.includes(saved.equipped) ? saved.equipped : 'shopkeeper',
    };
  } catch (e) { /* reset corrupt local collection */ }
  return { tickets: 0, unlocked: ['shopkeeper'], equipped: 'shopkeeper' };
}
let collection = readCollection();
function saveCollection(){ try { localStorage.setItem(COLLECTION_KEY, JSON.stringify(collection)); } catch (e) {} }
function characterGlyph(key){ return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="${GLYPHS[key] || GLYPHS.shopkeeper}"/></svg>`; }
let previewIndex = Math.max(0, CHARACTER_CATALOG.findIndex(character => character.key === collection.equipped));
let previewRenderer = null;
const previewThumbs = new Map();
let shopRenderer = null, shopScene = null, shopCamera = null, shopModel = null, shopLastFrame = 0, shopPreviewFrame = null;
const shopCanvas = $('#shopCanvas');
function thumbFor(character){
  if (previewThumbs.has(character.key)) return previewThumbs.get(character.key);
  if (!previewRenderer) {
    previewRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    previewRenderer.setSize(420, 420); previewRenderer.setClearColor(0x000000, 0);
  }
  const scene = new THREE.Scene();
  scene.add(new THREE.HemisphereLight(0xffffff, 0x846e9b, 1.15));
  const key = new THREE.DirectionalLight(0xffffff, 1.45); key.position.set(4, 7, 6); scene.add(key);
  const rim = new THREE.DirectionalLight(new THREE.Color(character.tone), 0.78); rim.position.set(-4, 4, -5); scene.add(rim);
  const model = (CHARACTERS[character.key] || CHARACTERS.shopkeeper)();
  scene.add(model);
  const bounds = new THREE.Box3().setFromObject(model);
  const size = bounds.getSize(new THREE.Vector3()); const center = bounds.getCenter(new THREE.Vector3());
  model.position.sub(center); model.position.y -= bounds.min.y - center.y;
  const maxDimension = Math.max(size.x, size.y, size.z);
  const camera = new THREE.PerspectiveCamera(27, 1, 0.1, 100);
  const distance = (maxDimension / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2))) * 1.24);
  camera.position.set(distance * 0.54, distance * 0.24, distance); camera.lookAt(0, size.y * 0.38, 0);
  previewRenderer.render(scene, camera);
  const url = previewRenderer.domElement.toDataURL('image/png');
  scene.remove(model); model.traverse(object => { if (!object.isMesh) return; object.geometry?.dispose(); const material = object.material; if (Array.isArray(material)) material.forEach(item => item.dispose?.()); else material?.dispose?.(); });
  previewThumbs.set(character.key, url); return url;
}
function disposePreviewModel(model){
  if (!model) return;
  model.traverse(object => {
    if (!object.isMesh) return;
    object.geometry?.dispose();
    const material = object.material;
    if (Array.isArray(material)) material.forEach(item => item.dispose?.());
    else material?.dispose?.();
  });
}
function ensureLivePreview(){
  if (shopRenderer) return;
  shopRenderer = new THREE.WebGLRenderer({ canvas: shopCanvas, alpha: true, antialias: true });
  shopRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
  shopRenderer.outputColorSpace = THREE.SRGBColorSpace;
  shopScene = new THREE.Scene();
  shopScene.add(new THREE.HemisphereLight(0xfff4fb, 0x5c4c85, 1.35));
  const key = new THREE.DirectionalLight(0xffffff, 1.65); key.position.set(4, 7, 6); shopScene.add(key);
  const rim = new THREE.DirectionalLight(0xff79b7, 1.05); rim.position.set(-5, 4, -5); shopScene.add(rim);
  shopCamera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
}
function setLivePreview(character){
  ensureLivePreview();
  if (shopModel) { shopScene.remove(shopModel); disposePreviewModel(shopModel); }
  const model = (CHARACTERS[character.key] || CHARACTERS.shopkeeper)();
  const bounds = new THREE.Box3().setFromObject(model);
  const size = bounds.getSize(new THREE.Vector3()); const center = bounds.getCenter(new THREE.Vector3());
  const targetHeight = 2.75;
  const scale = targetHeight / Math.max(0.01, size.y);
  model.position.set(-center.x, -bounds.min.y, -center.z);
  model.scale.setScalar(scale);
  shopModel = new THREE.Group(); shopModel.add(model); shopScene.add(shopModel);
}
function renderLivePreview(timestamp){
  shopPreviewFrame = null;
  if (!shopRenderer || !$('#shop').classList.contains('show') || !shopModel) return;
  const rect = shopCanvas.getBoundingClientRect();
  if (rect.width < 2 || rect.height < 2) return;
  const width = Math.round(rect.width), height = Math.round(rect.height);
  if (shopRenderer.domElement.width !== Math.round(width * shopRenderer.getPixelRatio()) || shopRenderer.domElement.height !== Math.round(height * shopRenderer.getPixelRatio())) {
    shopRenderer.setSize(width, height, false); shopCamera.aspect = width / height; shopCamera.updateProjectionMatrix();
  }
  const dt = Math.min(.05, Math.max(0, (timestamp - shopLastFrame) / 1000)); shopLastFrame = timestamp;
  if (!matchMedia('(prefers-reduced-motion: reduce)').matches) shopModel.rotation.y += dt * 0.48;
  shopModel.position.y = Math.sin(timestamp * 0.0025) * 0.025 - 1.18;
  shopCamera.position.set(4.8, 2.15, 7.2); shopCamera.lookAt(0, 0.22, 0);
  shopRenderer.render(shopScene, shopCamera);
  shopPreviewFrame = requestAnimationFrame(renderLivePreview);
}
function startLivePreview(){ if (!shopPreviewFrame) shopPreviewFrame = requestAnimationFrame(renderLivePreview); }
function renderCollection(){
  const equipped = CHARACTER_CATALOG.find(c => c.key === collection.equipped) || CHARACTER_CATALOG[0];
  const preview = CHARACTER_CATALOG[previewIndex] || equipped;
  const previous = CHARACTER_CATALOG[(previewIndex - 1 + CHARACTER_CATALOG.length) % CHARACTER_CATALOG.length];
  const next = CHARACTER_CATALOG[(previewIndex + 1) % CHARACTER_CATALOG.length];
  const unlocked = collection.unlocked.includes(preview.key);
  const selected = collection.equipped === preview.key;
  $('#ticketWallet').textContent = String(collection.tickets);
  $('#shopTickets').textContent = String(collection.tickets);
  const entryAvatar = $('#collectionEntry .collection-avatar');
  entryAvatar.style.setProperty('--avatar-tone', equipped.tone);
  entryAvatar.innerHTML = characterGlyph(equipped.key);
  if (shopRenderer) setLivePreview(preview);
  $('#shopPrev').src = thumbFor(previous); $('#shopNext').src = thumbFor(next);
  $('#shopCount').textContent = `${previewIndex + 1} / ${CHARACTER_CATALOG.length}`;
  $('#shopTier').textContent = preview.tier;
  $('#shopName').textContent = preview.name; $('#shopEnglish').textContent = preview.en;
  const state = $('#shopState'); state.className = 'shop-state ' + (unlocked ? 'owned' : 'locked');
  state.innerHTML = selected ? '使用中' : unlocked ? '已拥有 · 可装备' : `${TICKET_ICON} 解锁需要 ${preview.cost} 张车票`;
  const rail = $('#shopRail'); rail.innerHTML = CHARACTER_CATALOG.map((character, index) => `<i class="${index === previewIndex ? 'active' : collection.unlocked.includes(character.key) ? 'owned' : ''}"></i>`).join('');
  const action = $('#shopAction'); action.className = 'shop-action' + (selected ? ' equipped' : '');
  action.disabled = selected || (!unlocked && collection.tickets < preview.cost);
  action.innerHTML = selected ? '正在使用' : unlocked ? '装备这位角色' : collection.tickets < preview.cost ? `还差 ${preview.cost - collection.tickets} 张车票` : `${TICKET_ICON} 解锁角色 · ${preview.cost}`;
}
function selectCharacter(character){
  const unlocked = collection.unlocked.includes(character.key);
  if (!unlocked) {
    if (collection.tickets < character.cost) return;
    collection = { ...collection, tickets: collection.tickets - character.cost, unlocked: [...collection.unlocked, character.key] };
  }
  collection = { ...collection, equipped: character.key };
  saveCollection(); renderCollection(); api.setCharacter(character.key);
}
function movePreview(direction){ previewIndex = (previewIndex + direction + CHARACTER_CATALOG.length) % CHARACTER_CATALOG.length; renderCollection(); }
function awardTickets(score){
  const earned = Math.max(1, Math.min(8, Math.floor(score / 4) + 1));
  collection = { ...collection, tickets: collection.tickets + earned };
  saveCollection(); renderCollection();
  return earned;
}
function openShop(){
  renderCollection(); $('#shop').classList.add('show'); $('#shop').setAttribute('aria-hidden', 'false'); setLivePreview(CHARACTER_CATALOG[previewIndex]); startLivePreview();
}
function closeShop(){ $('#shop').classList.remove('show'); $('#shop').setAttribute('aria-hidden', 'true'); if (shopPreviewFrame) { cancelAnimationFrame(shopPreviewFrame); shopPreviewFrame = null; } }
renderCollection();

function applyCartridgeCopy(){
  const copy = CARTRIDGE.copy;
  $('#wordmark .b').innerHTML = copy.titleHtml;
  $('#wordmark .sub').textContent = copy.subtitle;
  $('#guide .g-label').textContent = copy.guide;
  $('#lbFull h2').textContent = copy.leaderboardTitle;
  $('#lbFull .lsub').textContent = copy.leaderboardSub;
  $('#over h1').textContent = copy.deadTitle;
  $('#over .stat:first-child .k').textContent = copy.scoreLabel;
  $('#over .stat.best .k').textContent = copy.bestLabel;
  $('#again').textContent = copy.againBtn;
  $('#overRank').textContent = copy.rankBtn;
}
applyCartridgeCopy();

let started = false;
let comboPopT = null;
let bumpT = null;

// Snapshot of my best on the wall, captured BEFORE this run begins.
// trySendBeatNotify uses (preRunBest, myScore] as the "users I just passed" window.
let preRunBest = 0;
function snapshotPreRunBest(){
  const A = window.Aigram;
  const meId = A && String(A.telegramId);
  if (meId && lbData.rows.length){
    const me = lbData.rows.find(r => String(r.user_id) === meId);
    preRunBest = me ? Number(me.score) || 0 : 0;
  } else {
    preRunBest = 0;
  }
}

// First interaction clears the title UI (wordmark + guide) and reveals the score.
function enterPlay(){
  if (started) return;
  started = true;
  snapshotPreRunBest();
  wordmarkEl.classList.add('hidden');
  guideEl.classList.remove('show');
  scoreEl.classList.add('show');
}

const hud = {
  setScore(n){
    scoreEl.textContent = String(n);
    scoreEl.classList.remove('bump'); void scoreEl.offsetWidth; scoreEl.classList.add('bump');
    clearTimeout(bumpT); bumpT = setTimeout(() => scoreEl.classList.remove('bump'), 320);
  },
  setCombo(n){
    if (n >= 2){
      comboEl.textContent = '×' + n + ' COMBO';
      comboEl.classList.add('show', 'pop');
      clearTimeout(comboPopT);
      comboPopT = setTimeout(() => comboEl.classList.remove('pop'), 340);
    } else {
      comboEl.classList.remove('show');
    }
  },
  setDead(payload){
    if (!payload){
      overEl.classList.remove('show');
      started = false;
      wordmarkEl.classList.remove('hidden');
      scoreEl.classList.remove('show');
      comboEl.classList.remove('show');
      scoreEl.textContent = '0';
      guideEl.classList.add('show');
      return;
    }
    $('#finalScore').textContent = String(payload.score);
    $('#finalBest').textContent = String(payload.best);
    const earned = awardTickets(payload.score);
    const oldReward = $('#runReward');
    if (oldReward) oldReward.remove();
    const reward = document.createElement('p'); reward.id = 'runReward'; reward.className = 'shop-note'; reward.textContent = `本局获得 ${earned} 张车票 · 再跳几步，解锁下一位通勤者`;
    $('#over .btns').before(reward);
    overEl.classList.add('show');
    trySendBeatNotify(payload.score);
    setTimeout(refreshLB, 1200);
  },
  setReady(on){
    guideEl.classList.toggle('show', on !== false && !started);
  },
  pop(text, tone){
    popEl.textContent = text;
    popEl.classList.remove('go', 'tone-perfect', 'tone-good', 'tone-plain', 'tone-barely');
    void popEl.offsetWidth;   // restart the animation
    popEl.classList.add('go', 'tone-' + (tone || 'perfect'));
  },
};

const api = startGame({ canvas, hud, selectedCharacter: collection.equipped });

$('#collectionEntry').addEventListener('click', openShop);
$('#shopClose').addEventListener('click', closeShop);
$('#shop').addEventListener('click', (event) => { if (event.target === $('#shop')) closeShop(); });
$('#shopPrevBtn').addEventListener('click', () => movePreview(-1));
$('#shopNextBtn').addEventListener('click', () => movePreview(1));
$('#shopAction').addEventListener('click', () => selectCharacter(CHARACTER_CATALOG[previewIndex]));

// ── Charge input — hold anywhere to charge, release to leap ──
addEventListener('pointerdown', (e) => {
  if (overEl.classList.contains('show')) return;
  if (e.target.closest('#lb, #lbFull, #collectionEntry, #shop')) return;   // let overlays receive taps
  enterPlay();
  api.chargeStart();
}, { passive:true });
addEventListener('pointerup', () => api.chargeRelease(), { passive:true });
addEventListener('pointercancel', () => api.chargeRelease(), { passive:true });

$('#again').addEventListener('click', () => api.restart());
$('#overShop').addEventListener('click', openShop);
$('#overRank').addEventListener('click', openLbFull);

// ── Champion pill + full leaderboard ──
const lbEl = $('#lb');
const lbFullEl = $('#lbFull');
const lblistEl = $('#lblist');

const ALTERU_APP_URL = 'https://alteru.app';
const LB_DOWNLOAD_TEXT = (navigator.language || '').toLowerCase().startsWith('zh')
  ? { hint: '在 AlterU 中打开即可查看排行榜', cta: '下载 AlterU' }
  : { hint: 'Open in AlterU to view the leaderboard.', cta: 'Get AlterU' };
function renderLBDownload(){
  lbData = { rows: [], meId: '' };
  if (lbEl) lbEl.classList.remove('show');
  lblistEl.innerHTML = '';
  const box = document.createElement('div');
  box.className = 'lb-download-state';
  const icon = document.createElement('span');
  icon.className = 'ico';
  icon.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10v5c0 3-2.1 5.4-5 5.9V17h3v2H9v-2h3v-3.1C9.1 13.4 7 11 7 8V3Zm-3 2h3v4c0 2.8 2.2 5 5 5v2C7.6 15.4 4 12.6 4 9V5Zm16 0v4c0 3.6-3.6 6.4-8 7v-2c2.8 0 5-2.2 5-5V5h3Z"/></svg>';
  const text = document.createElement('span');
  text.className = 'txt';
  text.textContent = LB_DOWNLOAD_TEXT.hint;
  const link = document.createElement('a');
  link.className = 'btn';
  link.href = ALTERU_APP_URL;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  link.textContent = LB_DOWNLOAD_TEXT.cta;
  box.append(icon, text, link);
  lblistEl.appendChild(box);
}
let lbData = { rows:[], meId:'' };

function lbInitial(name){
  const d = document.createElement('span');
  d.className = 'avf';
  d.textContent = ((name || '?').trim().charAt(0) || '?').toUpperCase();
  return d;
}
function lbAvatar(r){
  if (r.head_url){
    const img = document.createElement('img');
    img.className = 'av'; img.src = r.head_url; img.alt = ''; img.draggable = false;
    img.onerror = () => img.replaceWith(lbInitial(r.user_name));
    return img;
  }
  return lbInitial(r.user_name);
}
function lbChampionPill(r, isMe){
  const row = document.createElement('div');
  row.className = 'lbrow' + (isMe ? ' me' : '');
  row.innerHTML = '<svg class="crown" viewBox="0 0 24 24"><path d="M3 18 L2 7 L8 12 L12 4 L16 12 L22 7 L21 18 Z"/></svg>';
  row.appendChild(lbAvatar(r));
  const nm = document.createElement('span');
  let name = (r.user_name || '?').trim();
  if (name.length > 8) name = name.slice(0, 8) + '…';
  nm.className = 'nm'; nm.textContent = isMe ? 'YOU' : name;
  row.appendChild(nm);
  const sc = document.createElement('span');
  sc.className = 'sc'; sc.textContent = String(Number(r.score) || 0);
  row.appendChild(sc);
  row.addEventListener('click', openLbFull);
  return row;
}
function lbFullRow(r, isMe){
  const row = document.createElement('div');
  row.className = 'lfrow' + (isMe ? ' me' : '');
  const rk = document.createElement('span');
  rk.className = 'rk'; rk.textContent = '#' + r.rank;
  row.appendChild(rk);
  row.appendChild(lbAvatar(r));
  const nm = document.createElement('span');
  nm.className = 'nm'; nm.textContent = isMe ? 'YOU' : (r.user_name || '?');
  row.appendChild(nm);
  const sc = document.createElement('span');
  sc.className = 'sc'; sc.textContent = String(Number(r.score) || 0);
  row.appendChild(sc);
  if (!isMe && r.user_id){
    row.addEventListener('click', () => window.Aigram && window.Aigram.openAigramProfile(r.user_id));
  }
  return row;
}
function openLbFull(){
  const A = window.Aigram;
  if (!A || !A.canRank) { renderLBDownload(); lbFullEl.classList.add('show'); return; }
  lblistEl.innerHTML = '';
  for (const r of lbData.rows) lblistEl.appendChild(lbFullRow(r, String(r.user_id) === lbData.meId));
  lbFullEl.classList.add('show');
  refreshLB();
}
$('#lbClose').addEventListener('click', () => lbFullEl.classList.remove('show'));

function renderLB(rows, meId){
  if (!rows.length){ lbEl.classList.remove('show'); return; }
  rows = rows.slice().sort((a, b) => (a.rank || 999) - (b.rank || 999));
  lbData = { rows, meId };
  lbEl.innerHTML = '';
  lbEl.appendChild(lbChampionPill(rows[0], String(rows[0].user_id) === meId));
  lbEl.classList.add('show');
}
window.__lbRender = renderLB;

async function refreshLB(){
  const A = window.Aigram;
  if (!A || !A.canRank) { if (lbFullEl.classList.contains('show')) renderLBDownload(); return; }
  try {
    const res = await A.callAigramAPI('/note/aigram/ai/game/rank/score/list/by/session_id?session_id=' + A.gameUuid, 'GET');
    const rows = Array.isArray(res) ? res : (res && res.data) || [];
    renderLB(rows, String(A.telegramId));
  } catch (e) { /* keep whatever is shown */ }
}

// ── Leaderboard-beat 1:1 notify (score_beat) — see aigram-notify skill ────
// On death, if my new score pushes the closest user out of their rank, push
// them a notify so the rival comes back to chase the new mark. Self-guarded,
// silent on failure. preRunBest snapshot happens at enterPlay() above.
async function trySendBeatNotify(myScore){
  const A = window.Aigram;
  if (!A || !A.canRank || !A.telegramId) return;
  if (myScore <= preRunBest) return;
  try {
    const res = await A.callAigramAPI(
      '/note/aigram/ai/game/rank/score/list/by/session_id?session_id=' + A.gameUuid, 'GET');
    const rows = Array.isArray(res) ? res : (res && res.data) || [];
    const meId = String(A.telegramId);
    const beaten = rows
      .filter(r => String(r.user_id) !== meId)
      .map(r => ({ id: String(r.user_id), score: Number(r.score) || 0 }))
      .filter(r => r.score < myScore && r.score > preRunBest)
      .sort((a, b) => b.score - a.score)[0];
    if (!beaten) return;
    A.postAigramAPI('/note/aigram/ai/game/record/play', {
      session_id: A.gameUuid,
      event: 'score_beat',
      config_json: { actions: [{
        type: 'notify',
        target_user_id: beaten.id,
        image: {
          ref_url: 'https://yinxinghuan.github.io/games/posters/sky-leap.png',
          prompt: 'A voxel hero mid-leap arcing over candy-pink floating pillars in a dreamy sky.',
        },
        message: {
          template: '{sender_name} just leapt past your record — ' + Math.round(myScore) + ' on Sky Leap.',
          variables: ['sender_name'],
        },
      }] },
    });
  } catch (e) { /* silent */ }
}

refreshLB();
</script>
