<!DOCTYPE html>
<html lang="en">
<head>
<meta name="game-uuid" content="eefd9179-7b36-4440-8b73-0cb1ea4e153e" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Sky Leap</title>
<script src="./aigram-bridge.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#1a1226; --ink2:#2c2238;
    --paper:#fff7e6; --paper2:#ffeec4;
    --yellow:#ffce2e; --red:#ff4438; --teal:#3fb6ac;
    --pink:#f5b1c7; --hotpink:#ff5ea0;
    --comic:"Bangers","PingFang SC",sans-serif;
    --pow:"Luckiest Guy","PingFang SC",sans-serif;
  }
  html, body {
    margin:0; height:100%; overflow:hidden;
    background:linear-gradient(#5aa3da 0%, #8cc0e8 45%, #f5b1c7 100%);
    font-family:var(--comic);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  #wrap { position:fixed; inset:0; overflow:hidden; }
  #c { display:block; width:100%; height:100%; touch-action:none; }

  .hud { position:fixed; pointer-events:none; z-index:5; }

  /* ── Wordmark — comic brandmark, title state only ── */
  #wordmark {
    top:max(24px,env(safe-area-inset-top)); left:50%;
    transform:translateX(-50%) rotate(-3deg);
    text-align:center; line-height:.92;
    transition:opacity .35s, transform .35s;
  }
  #wordmark .b {
    display:block; font-family:var(--comic); font-weight:400; color:var(--yellow);
    font-size:54px; letter-spacing:.03em;
    -webkit-text-stroke:2.6px var(--ink); paint-order:stroke fill;
    text-shadow:5px 6px 0 var(--red);
  }
  #wordmark .sub {
    display:block; font-family:var(--comic); font-size:15px; letter-spacing:.22em;
    color:var(--paper); -webkit-text-stroke:1.4px var(--ink); paint-order:stroke fill;
    margin-top:7px;
  }
  #wordmark.hidden { opacity:0; transform:translate(-50%,-18px) rotate(-3deg); }

  /* ── Score — comic number, centered top ── */
  #score {
    top:max(20px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-family:var(--comic); color:var(--paper);
    font-size:62px; line-height:1; font-variant-numeric:tabular-nums; letter-spacing:.02em;
    -webkit-text-stroke:3px var(--ink); paint-order:stroke fill;
    text-shadow:3px 4px 0 rgba(26,18,38,.35);
    opacity:0; transition:opacity .25s;
  }
  #score.show { opacity:1; }

  /* ── Combo — pop-art, under the score when ≥2 ── */
  #combo {
    top:calc(max(20px,env(safe-area-inset-top)) + 66px); left:50%;
    transform:translateX(-50%) rotate(-5deg);
    font-family:var(--pow); color:var(--yellow);
    font-size:23px; letter-spacing:.02em; line-height:1;
    -webkit-text-stroke:2.4px var(--ink); paint-order:stroke fill;
    opacity:0; transition:opacity .2s;
  }
  #combo.show { opacity:1; }
  #combo.pop { animation:sl-combopop .3s cubic-bezier(.3,1.6,.5,1); }
  @keyframes sl-combopop { from{transform:translateX(-50%) rotate(-5deg) scale(.55);} to{transform:translateX(-50%) rotate(-5deg) scale(1);} }

  /* ── Floating PERFECT / combo pop ── */
  #pop {
    top:36%; left:50%; transform:translate(-50%,-50%) rotate(-4deg);
    font-family:var(--pow); color:var(--yellow);
    font-size:38px; letter-spacing:.02em; white-space:nowrap; text-align:center;
    -webkit-text-stroke:3px var(--ink); paint-order:stroke fill;
    text-shadow:4px 5px 0 var(--red);
    opacity:0;
  }
  #pop.go { animation:sl-pop .72s ease-out; }
  @keyframes sl-pop {
    0%   { opacity:0; transform:translate(-50%,-50%) rotate(-4deg) scale(.5); }
    22%  { opacity:1; transform:translate(-50%,-62%) rotate(-4deg) scale(1.12); }
    100% { opacity:0; transform:translate(-50%,-96%) rotate(-4deg) scale(1); }
  }

  /* ── Guide / onboarding — animated finger press-hold-release demo (title state) ── */
  #guide {
    bottom:calc(17% + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    width:200px; height:150px;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    opacity:0; transition:opacity .4s;
  }
  #guide.show { opacity:1; }
  #guide .stage { position:relative; width:120px; height:108px; }
  /* charge ring that fills while "holding" */
  #guide .gring {
    position:absolute; left:50%; bottom:8px; width:54px; height:54px; margin-left:-27px;
    border-radius:50%; box-sizing:border-box;
    border:5px solid var(--gold, #ffce2e); border-color:var(--yellow);
    opacity:0;
    animation:g-ring 2.6s ease-in-out infinite;
  }
  /* the finger */
  #guide .gdot {
    position:absolute; left:50%; bottom:6px; width:34px; height:34px; margin-left:-17px;
    border-radius:50%; background:var(--paper); border:3px solid var(--ink);
    box-shadow:2px 3px 0 rgba(26,18,38,.5);
    animation:g-dot 2.6s ease-in-out infinite;
  }
  /* dotted leap arc that flashes on "release" */
  #guide .garc {
    position:absolute; left:14px; bottom:30px; width:92px; height:60px;
    border:none; opacity:0;
  }
  #guide .garc svg { width:100%; height:100%; overflow:visible; }
  #guide .garc path { fill:none; stroke:var(--paper); stroke-width:3.5; stroke-linecap:round; stroke-dasharray:4 7; }
  #guide.show .garc { animation:g-arc 2.6s ease-in-out infinite; }
  #guide .glabel {
    margin-top:6px; font-family:var(--comic); font-size:18px; letter-spacing:.05em;
    color:var(--paper); -webkit-text-stroke:1.6px var(--ink); paint-order:stroke fill;
    text-align:center; white-space:nowrap;
  }
  @keyframes g-dot {
    0%   { transform:translateY(6px) scale(.9); }
    10%  { transform:translateY(0) scale(1); }
    18%,52% { transform:translateY(2px) scale(.8); }   /* pressing + holding */
    62% { transform:translateY(-2px) scale(1.18); }     /* release pop */
    80% { transform:translateY(-46px) scale(1); }       /* leaps up */
    92%,100% { transform:translateY(-64px) scale(.9); opacity:0; }
  }
  @keyframes g-ring {
    0%,14% { transform:scale(.45); opacity:0; }
    22% { opacity:.95; }
    52% { transform:scale(1.35); opacity:.95; }          /* charged */
    62% { transform:scale(1.7); opacity:0; }             /* burst on release */
    100% { opacity:0; }
  }
  @keyframes g-arc {
    0%,58% { opacity:0; }
    66% { opacity:1; }
    86% { opacity:1; }
    100% { opacity:0; }
  }

  /* ── Game over card — comic paper ── */
  #over {
    position:fixed; inset:0; display:none;
    align-items:center; justify-content:center;
    background:rgba(26,18,38,.5); z-index:30; padding:24px;
    pointer-events:auto;
  }
  #over.show { display:flex; }
  #over .card {
    box-sizing:border-box; text-align:center; max-width:330px; width:100%;
    background:var(--paper); color:var(--ink);
    border:4px solid var(--ink); border-radius:10px; box-shadow:7px 7px 0 var(--ink);
    padding:22px 22px 20px; transform:rotate(-1.2deg);
    display:flex; flex-direction:column; align-items:center;
  }
  #over h1 {
    font-family:var(--pow); font-size:clamp(30px,9vw,40px); color:var(--red);
    -webkit-text-stroke:2.6px var(--ink); paint-order:stroke fill;
    margin:0 0 12px; letter-spacing:.01em; transform:rotate(1deg); line-height:1.02;
  }
  #over .rows { display:flex; gap:30px; justify-content:center; margin:2px 0 6px; }
  #over .stat { display:flex; flex-direction:column; align-items:center; gap:1px; }
  #over .stat .k {
    font-family:var(--comic); font-size:13px; letter-spacing:.16em; color:var(--ink2);
    text-transform:uppercase;
  }
  #over .stat .v {
    font-family:var(--comic); font-size:46px; color:var(--ink);
    font-variant-numeric:tabular-nums; line-height:1;
  }
  #over .stat.best .v { color:#e0962a; }
  #over .again {
    margin-top:16px; pointer-events:auto;
    padding:11px 38px; border:3px solid var(--ink); border-radius:999px;
    background:var(--yellow); color:var(--ink);
    font-family:var(--comic); font-size:22px; letter-spacing:.06em;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    box-shadow:3px 4px 0 var(--ink);
  }
  #over .again:active { transform:translate(2px,3px); box-shadow:1px 1px 0 var(--ink); }

  /* ── Champion pill — comic paper, tap to open the full leaderboard ── */
  #lb {
    position:fixed; top:max(16px,env(safe-area-inset-top)); right:12px; z-index:6; pointer-events:auto;
    display:none;
  }
  #lb.show { display:block; }
  .lbrow {
    display:flex; align-items:center; gap:6px;
    background:var(--paper); border:2.5px solid var(--ink);
    box-shadow:2px 3px 0 var(--ink);
    border-radius:999px; padding:3px 12px 3px 4px;
    font-family:var(--comic); font-size:17px; color:var(--ink); line-height:1; letter-spacing:.02em;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .lbrow:active { transform:translate(1px,2px); box-shadow:1px 1px 0 var(--ink); }
  .lbrow .crown { width:17px; height:17px; flex:0 0 auto; display:block; }
  .lbrow .crown path { fill:var(--yellow); stroke:var(--ink); stroke-width:1.6; stroke-linejoin:round; }
  .lbrow .av, .lbrow .avf {
    width:24px; height:24px; border-radius:50%; border:2px solid var(--ink);
    flex:0 0 auto; display:block; object-fit:cover;
  }
  .lbrow .avf {
    background:var(--teal); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:13px;
  }
  .lbrow .nm { max-width:64px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lbrow .sc { color:var(--red); font-variant-numeric:tabular-nums; }
  .lbrow.me .nm { color:var(--teal); }

  /* ── Full leaderboard overlay — comic ── */
  #lbFull {
    position:fixed; inset:0; display:none; z-index:40; padding:20px;
    align-items:center; justify-content:center;
    background:rgba(26,18,38,.55); pointer-events:auto;
  }
  #lbFull.show { display:flex; }
  #lbFull .lcard {
    background:var(--paper); border:4px solid var(--ink);
    border-radius:12px; width:100%; max-width:380px; max-height:84vh;
    display:flex; flex-direction:column; padding:18px 16px 16px;
    box-shadow:7px 7px 0 var(--ink); transform:rotate(-.8deg);
  }
  #lbFull h2 {
    font-family:var(--pow); font-size:28px; color:var(--teal);
    -webkit-text-stroke:2px var(--ink); paint-order:stroke fill;
    margin:0 0 14px; text-align:center; letter-spacing:.02em; transform:rotate(1deg);
  }
  #lblist {
    display:flex; flex-direction:column; gap:8px;
    overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2px;
  }
  .lfrow {
    display:flex; align-items:center; gap:10px;
    border:2.5px solid var(--ink); border-radius:10px; background:#fffdf5;
    box-shadow:2px 2px 0 var(--ink);
    padding:7px 12px 7px 9px; cursor:pointer;
    font-family:var(--comic); font-size:19px; color:var(--ink); line-height:1; letter-spacing:.02em;
    -webkit-tap-highlight-color:transparent;
  }
  .lfrow:active { transform:translate(1px,1px); box-shadow:1px 1px 0 var(--ink); }
  .lfrow .rk { font-size:16px; min-width:30px; text-align:center; color:var(--red); }
  .lfrow .av, .lfrow .avf {
    width:32px; height:32px; border-radius:50%; border:2px solid var(--ink);
    flex:0 0 auto; display:block; object-fit:cover;
  }
  .lfrow .avf {
    background:var(--teal); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .lfrow .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lfrow .sc { color:var(--red); font-variant-numeric:tabular-nums; }
  .lfrow.me { background:var(--paper2); }
  .lfrow.me .nm { color:var(--teal); }
  #lbClose {
    margin-top:14px; align-self:center; padding:9px 30px; border:3px solid var(--ink);
    background:var(--yellow); color:var(--ink); font-family:var(--comic); font-size:19px;
    letter-spacing:.05em; border-radius:999px; cursor:pointer; box-shadow:3px 3px 0 var(--ink);
    -webkit-tap-highlight-color:transparent;
  }
  #lbClose:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="wordmark" class="hud"><span class="b">SKY LEAP</span><span class="sub">RUINS OF THE SKY</span></div>
  <div id="score" class="hud">0</div>
  <div id="combo" class="hud"></div>
  <div id="pop" class="hud"></div>
  <div id="guide" class="hud">
    <div class="stage">
      <div class="garc"><svg viewBox="0 0 92 60" preserveAspectRatio="none"><path d="M6 56 Q46 -10 86 40"/></svg></div>
      <div class="gring"></div>
      <div class="gdot"></div>
    </div>
    <div class="glabel">HOLD &middot; RELEASE TO LEAP</div>
  </div>
  <div id="lb"></div>
</div>

<div id="lbFull">
  <div class="lcard">
    <h2>SKY PILGRIMS</h2>
    <div id="lblist"></div>
    <button id="lbClose">CLOSE</button>
  </div>
</div>

<div id="over">
  <div class="card">
    <h1>FELL INTO<br>THE CLOUDS</h1>
    <div class="rows">
      <div class="stat"><span class="k">Reached</span><span class="v" id="finalScore">0</span></div>
      <div class="stat best"><span class="k">Best</span><span class="v" id="finalBest">0</span></div>
    </div>
    <button class="again" id="again">LEAP AGAIN</button>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import { startGame } from './game.js?v=44';

const $ = (s) => document.querySelector(s);
const canvas = $('#c');
const wordmarkEl = $('#wordmark');
const scoreEl = $('#score');
const comboEl = $('#combo');
const popEl = $('#pop');
const guideEl = $('#guide');
const overEl = $('#over');

let started = false;
let comboPopT = null;

// First interaction clears the title UI (wordmark + guide) and reveals the score.
function enterPlay(){
  if (started) return;
  started = true;
  wordmarkEl.classList.add('hidden');
  guideEl.classList.remove('show');
  scoreEl.classList.add('show');
}

const hud = {
  setScore(n){ scoreEl.textContent = String(n); },
  setCombo(n){
    if (n >= 2){
      comboEl.textContent = '×' + n + ' COMBO';
      comboEl.classList.add('show', 'pop');
      clearTimeout(comboPopT);
      comboPopT = setTimeout(() => comboEl.classList.remove('pop'), 300);
    } else {
      comboEl.classList.remove('show');
    }
  },
  setDead(payload){
    if (!payload){
      overEl.classList.remove('show');
      started = false;
      wordmarkEl.classList.remove('hidden');
      scoreEl.classList.remove('show');
      comboEl.classList.remove('show');
      scoreEl.textContent = '0';
      guideEl.classList.add('show');
      return;
    }
    $('#finalScore').textContent = String(payload.score);
    $('#finalBest').textContent = String(payload.best);
    overEl.classList.add('show');
    setTimeout(refreshLB, 1200);
  },
  setReady(on){
    guideEl.classList.toggle('show', on !== false && !started);
  },
  pop(text){
    popEl.textContent = text;
    popEl.classList.remove('go');
    void popEl.offsetWidth;   // restart the animation
    popEl.classList.add('go');
  },
};

const api = startGame({ canvas, hud });

// ── Charge input — hold anywhere to charge, release to leap ──
addEventListener('pointerdown', (e) => {
  if (overEl.classList.contains('show')) return;
  if (e.target.closest('#lb, #lbFull')) return;   // let leaderboard taps through
  enterPlay();
  api.chargeStart();
}, { passive:true });
addEventListener('pointerup', () => api.chargeRelease(), { passive:true });
addEventListener('pointercancel', () => api.chargeRelease(), { passive:true });

$('#again').addEventListener('click', () => api.restart());

// ── Champion pill + full leaderboard ──
const lbEl = $('#lb');
const lbFullEl = $('#lbFull');
const lblistEl = $('#lblist');
let lbData = { rows:[], meId:'' };

function lbInitial(name){
  const d = document.createElement('span');
  d.className = 'avf';
  d.textContent = ((name || '?').trim().charAt(0) || '?').toUpperCase();
  return d;
}
function lbAvatar(r){
  if (r.head_url){
    const img = document.createElement('img');
    img.className = 'av'; img.src = r.head_url; img.alt = ''; img.draggable = false;
    img.onerror = () => img.replaceWith(lbInitial(r.user_name));
    return img;
  }
  return lbInitial(r.user_name);
}
function lbChampionPill(r, isMe){
  const row = document.createElement('div');
  row.className = 'lbrow' + (isMe ? ' me' : '');
  row.innerHTML = '<svg class="crown" viewBox="0 0 24 24"><path d="M3 18 L2 7 L8 12 L12 4 L16 12 L22 7 L21 18 Z"/></svg>';
  row.appendChild(lbAvatar(r));
  const nm = document.createElement('span');
  let name = (r.user_name || '?').trim();
  if (name.length > 8) name = name.slice(0, 8) + '…';
  nm.className = 'nm'; nm.textContent = isMe ? 'YOU' : name;
  row.appendChild(nm);
  const sc = document.createElement('span');
  sc.className = 'sc'; sc.textContent = String(Number(r.score) || 0);
  row.appendChild(sc);
  row.addEventListener('click', openLbFull);
  return row;
}
function lbFullRow(r, isMe){
  const row = document.createElement('div');
  row.className = 'lfrow' + (isMe ? ' me' : '');
  const rk = document.createElement('span');
  rk.className = 'rk'; rk.textContent = '#' + r.rank;
  row.appendChild(rk);
  row.appendChild(lbAvatar(r));
  const nm = document.createElement('span');
  nm.className = 'nm'; nm.textContent = isMe ? 'YOU' : (r.user_name || '?');
  row.appendChild(nm);
  const sc = document.createElement('span');
  sc.className = 'sc'; sc.textContent = String(Number(r.score) || 0);
  row.appendChild(sc);
  if (!isMe && r.user_id){
    row.addEventListener('click', () => window.Aigram && window.Aigram.openAigramProfile(r.user_id));
  }
  return row;
}
function openLbFull(){
  lblistEl.innerHTML = '';
  for (const r of lbData.rows) lblistEl.appendChild(lbFullRow(r, String(r.user_id) === lbData.meId));
  lbFullEl.classList.add('show');
  refreshLB();
}
$('#lbClose').addEventListener('click', () => lbFullEl.classList.remove('show'));

function renderLB(rows, meId){
  if (!rows.length){ lbEl.classList.remove('show'); return; }
  rows = rows.slice().sort((a, b) => (a.rank || 999) - (b.rank || 999));
  lbData = { rows, meId };
  lbEl.innerHTML = '';
  lbEl.appendChild(lbChampionPill(rows[0], String(rows[0].user_id) === meId));
  lbEl.classList.add('show');
}
window.__lbRender = renderLB;

async function refreshLB(){
  const A = window.Aigram;
  if (!A || !A.canRank) return;
  try {
    const res = await A.callAigramAPI('/note/aigram/ai/game/rank/score/list/by/session_id?session_id=' + A.gameUuid, 'GET');
    const rows = Array.isArray(res) ? res : (res && res.data) || [];
    renderLB(rows, String(A.telegramId));
  } catch (e) { /* keep whatever is shown */ }
}
refreshLB();
</script>
</body>
</html>
